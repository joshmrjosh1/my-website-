<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkNow — Job Board</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #111;
    --ink-light: #555;
    --bg: #f5f2ec;
    --card: #fff;
    --accent: #d4571e;
    --accent-pale: #fdf0ea;
    --border: #e2ddd5;
    --tag-bg: #edeae4;
    --tag-text: #444;
    --green: #1a7a4a;
    --green-pale: #e8f5ee;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    font-style: italic;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  /* NAV */
  nav {
    background: var(--ink);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    color: #fff;
    text-decoration: none;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent); }
  nav a.post-btn {
    background: var(--accent);
    color: #fff;
    padding: 0.5rem 1.2rem;
    border-radius: 6px;
    text-decoration: none;
    font-size: 0.875rem;
    font-weight: 500;
    transition: opacity 0.2s;
  }
  nav a.post-btn:hover { opacity: 0.85; }

  /* HERO */
  .hero {
    background: var(--ink);
    color: #fff;
    padding: 4rem 2rem 3rem;
    text-align: center;
  }
  .hero h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2.2rem, 5vw, 3.6rem);
    line-height: 1.15;
    margin-bottom: 0.75rem;
  }
  .hero h1 em { color: var(--accent); font-style: italic; }
  .hero p {
    color: #aaa;
    font-size: 1rem;
    margin-bottom: 2rem;
  }

  /* SEARCH */
  .search-bar {
    display: flex;
    max-width: 600px;
    margin: 0 auto;
    background: #fff;
    border-radius: 8px;
    overflow: hidden;
    border: 2px solid transparent;
    transition: border-color 0.2s;
  }
  .search-bar:focus-within { border-color: var(--accent); }
  .search-bar input {
    flex: 1;
    border: none;
    outline: none;
    padding: 0.85rem 1rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--ink);
    background: transparent;
  }
  .search-bar button {
    background: var(--accent);
    border: none;
    color: #fff;
    padding: 0 1.4rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    transition: opacity 0.2s;
  }
  .search-bar button:hover { opacity: 0.85; }

  /* FILTERS */
  .filters {
    max-width: 1100px;
    margin: 2rem auto 0;
    padding: 0 1.5rem;
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-label {
    font-size: 0.8rem;
    color: var(--ink-light);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-right: 0.3rem;
  }
  .filter-btn {
    background: var(--card);
    border: 1.5px solid var(--border);
    color: var(--ink-light);
    padding: 0.4rem 0.9rem;
    border-radius: 20px;
    font-size: 0.8rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    transition: all 0.15s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }

  /* RESULTS META */
  .results-meta {
    max-width: 1100px;
    margin: 1.5rem auto 0.75rem;
    padding: 0 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.85rem;
    color: var(--ink-light);
  }
  #results-count { font-weight: 500; }

  /* JOB GRID */
  .jobs-grid {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 1.5rem 4rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1.2rem;
  }

  /* JOB CARD */
  .job-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 1.4rem;
    transition: transform 0.18s, border-color 0.18s;
    cursor: pointer;
    animation: fadeUp 0.35s ease both;
  }
  .job-card:hover {
    transform: translateY(-3px);
    border-color: var(--accent);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1rem;
  }
  .company-logo {
    width: 44px;
    height: 44px;
    border-radius: 8px;
    background: var(--tag-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    color: var(--ink);
    flex-shrink: 0;
  }
  .featured-badge {
    background: var(--accent-pale);
    color: var(--accent);
    font-size: 0.7rem;
    font-weight: 500;
    padding: 0.2rem 0.6rem;
    border-radius: 4px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .job-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.15rem;
    color: var(--ink);
    margin-bottom: 0.25rem;
    line-height: 1.3;
  }
  .company-name {
    font-size: 0.85rem;
    color: var(--ink-light);
    margin-bottom: 0.9rem;
  }
  .pay {
    font-size: 1.05rem;
    font-weight: 500;
    color: var(--green);
    background: var(--green-pale);
    display: inline-block;
    padding: 0.3rem 0.75rem;
    border-radius: 6px;
    margin-bottom: 0.9rem;
  }
  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-bottom: 1rem;
  }
  .tag {
    background: var(--tag-bg);
    color: var(--tag-text);
    font-size: 0.75rem;
    padding: 0.25rem 0.65rem;
    border-radius: 4px;
  }
  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid var(--border);
    padding-top: 0.9rem;
    margin-top: 0.2rem;
  }
  .location {
    font-size: 0.8rem;
    color: var(--ink-light);
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }
  .posted {
    font-size: 0.78rem;
    color: var(--ink-light);
  }
  .apply-btn {
    background: var(--ink);
    color: #fff;
    border: none;
    padding: 0.5rem 1.1rem;
    border-radius: 6px;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: background 0.18s;
    text-decoration: none;
  }
  .apply-btn:hover { background: var(--accent); }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card);
    border-radius: 14px;
    max-width: 560px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    padding: 2rem;
    position: relative;
  }
  .modal-close {
    position: absolute;
    top: 1.1rem;
    right: 1.1rem;
    background: var(--tag-bg);
    border: none;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink);
  }
  .modal h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    margin-bottom: 0.3rem;
  }
  .modal .co { color: var(--ink-light); margin-bottom: 1rem; font-size: 0.9rem; }
  .modal .pay { margin-bottom: 1rem; }
  .modal h3 { font-size: 0.9rem; font-weight: 500; margin: 1.2rem 0 0.4rem; color: var(--ink); }
  .modal p { font-size: 0.9rem; color: #444; line-height: 1.65; }
  .modal ul { padding-left: 1.2rem; font-size: 0.9rem; color: #444; line-height: 1.8; }
  .modal .apply-big {
    display: block;
    margin-top: 1.5rem;
    background: var(--accent);
    color: #fff;
    text-align: center;
    padding: 0.85rem;
    border-radius: 8px;
    font-weight: 500;
    text-decoration: none;
    font-size: 0.95rem;
    transition: opacity 0.2s;
  }
  .modal .apply-big:hover { opacity: 0.85; }

  /* POST A JOB MODAL */
  .post-modal {
    background: var(--card);
    border-radius: 14px;
    max-width: 600px;
    width: 100%;
    max-height: 92vh;
    overflow-y: auto;
    padding: 2rem;
    position: relative;
  }
  .post-modal h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    margin-bottom: 1.5rem;
  }
  .form-group { margin-bottom: 1rem; }
  .form-group label {
    display: block;
    font-size: 0.82rem;
    font-weight: 500;
    margin-bottom: 0.4rem;
    color: var(--ink);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 7px;
    padding: 0.7rem 0.9rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--ink);
    background: var(--bg);
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 100px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .submit-job {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 0.85rem;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: opacity 0.2s;
  }
  .submit-job:hover { opacity: 0.85; }

  .no-results {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--ink-light);
    grid-column: 1/-1;
  }
  .no-results p { font-size: 1rem; margin-top: 0.5rem; }

  /* FOOTER */
  footer {
    background: var(--ink);
    color: #888;
    text-align: center;
    padding: 2rem;
    font-size: 0.82rem;
  }
  footer span { color: var(--accent); }
</style>
</head>
<body>

<nav>
  <a href="#" class="logo">Work<span>Now</span></a>
  <a href="#" class="post-btn" id="open-post-modal">+ Post a Job</a>
</nav>

<div class="hero">
  <h1>Find work that <em>pays.</em></h1>
  <p>Browse open roles with transparent salaries — no guessing.</p>
  <div class="search-bar">
    <input type="text" id="search-input" placeholder="Search job title, company, or keyword…">
    <button onclick="applyFilters()">Search</button>
  </div>
</div>

<div class="filters">
  <span class="filter-label">Type:</span>
  <button class="filter-btn active" data-filter="type" data-value="all" onclick="setFilter('type','all',this)">All</button>
  <button class="filter-btn" data-filter="type" data-value="Full-time" onclick="setFilter('type','Full-time',this)">Full-time</button>
  <button class="filter-btn" data-filter="type" data-value="Part-time" onclick="setFilter('type','Part-time',this)">Part-time</button>
  <button class="filter-btn" data-filter="type" data-value="Contract" onclick="setFilter('type','Contract',this)">Contract</button>
  <button class="filter-btn" data-filter="type" data-value="Remote" onclick="setFilter('type','Remote',this)">Remote</button>
</div>

<div class="results-meta">
  <span id="results-count"></span>
</div>

<div class="jobs-grid" id="jobs-grid"></div>

<!-- Job detail modal -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('detail-modal')">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<!-- Post a job modal -->
<div class="modal-overlay" id="post-modal">
  <div class="post-modal">
    <button class="modal-close" onclick="closeModal('post-modal')">✕</button>
    <h2>Post a job</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Job title *</label>
        <input type="text" id="f-title" placeholder="e.g. UX Designer">
      </div>
      <div class="form-group">
        <label>Company name *</label>
        <input type="text" id="f-company" placeholder="e.g. Acme Corp">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Salary / pay *</label>
        <input type="text" id="f-pay" placeholder="e.g. ₦250,000/mo or $60k/yr">
      </div>
      <div class="form-group">
        <label>Employment type *</label>
        <select id="f-type">
          <option value="Full-time">Full-time</option>
          <option value="Part-time">Part-time</option>
          <option value="Contract">Contract</option>
          <option value="Remote">Remote</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Location</label>
        <input type="text" id="f-location" placeholder="e.g. Lagos, NG or Remote">
      </div>
      <div class="form-group">
        <label>Apply link or email *</label>
        <input type="text" id="f-apply" placeholder="https://… or email@co.com">
      </div>
    </div>
    <div class="form-group">
      <label>Tags (comma-separated)</label>
      <input type="text" id="f-tags" placeholder="e.g. React, Node.js, Design">
    </div>
    <div class="form-group">
      <label>Job description *</label>
      <textarea id="f-desc" placeholder="Describe the role, responsibilities, and requirements…"></textarea>
    </div>
    <button class="submit-job" onclick="postJob()">Publish listing</button>
  </div>
</div>

<footer>
  &copy; 2026 <span>WorkNow</span>. Built for employers and job seekers.
</footer>

<script>
let jobs = [
  {
    id: 1,
    title: "Senior Frontend Developer",
    company: "TechBridge Ltd",
    pay: "₦650,000/mo",
    type: "Full-time",
    location: "Lagos, NG",
    tags: ["React", "TypeScript", "Tailwind"],
    posted: "2 days ago",
    featured: true,
    desc: "We're looking for an experienced frontend engineer to lead our web product team. You'll work closely with design and backend to ship beautiful, performant interfaces.",
    requirements: ["4+ years React experience", "Strong TypeScript skills", "Experience with CI/CD pipelines", "Good communication skills"]
  },
  {
    id: 2,
    title: "Marketing Manager",
    company: "Kola Brands",
    pay: "₦380,000/mo",
    type: "Full-time",
    location: "Abuja, NG",
    tags: ["Digital Marketing", "SEO", "Analytics"],
    posted: "1 week ago",
    featured: false,
    desc: "Drive growth for our FMCG brands across digital channels. You'll own strategy, execution, and reporting for social, search, and email campaigns.",
    requirements: ["3+ years digital marketing", "Experience with Google & Meta Ads", "Data-driven mindset", "FMCG background a plus"]
  },
  {
    id: 3,
    title: "Remote Customer Support Lead",
    company: "Paystack",
    pay: "₦300,000/mo",
    type: "Remote",
    location: "Remote",
    tags: ["Support", "CRM", "Communication"],
    posted: "3 days ago",
    featured: true,
    desc: "Lead a team of support agents helping merchants succeed on our platform. You'll set processes, handle escalations, and report on team performance.",
    requirements: ["2+ years support leadership", "Experience with Zendesk or Intercom", "Excellent written English", "Fintech background preferred"]
  },
  {
    id: 4,
    title: "Data Analyst",
    company: "Flutterwave",
    pay: "₦500,000/mo",
    type: "Full-time",
    location: "Lagos, NG",
    tags: ["SQL", "Python", "Tableau", "Analytics"],
    posted: "5 days ago",
    featured: false,
    desc: "Join our data team to turn transaction data into insights that shape business decisions across product, risk, and growth.",
    requirements: ["Strong SQL & Python skills", "Experience with BI tools", "Statistical modelling knowledge", "Financial services experience a plus"]
  },
  {
    id: 5,
    title: "Graphic Designer",
    company: "Zuri Agency",
    pay: "₦180,000/mo",
    type: "Contract",
    location: "Remote",
    tags: ["Figma", "Illustrator", "Branding"],
    posted: "Today",
    featured: false,
    desc: "We need a creative designer for a 6-month contract to refresh brand assets for 3 clients. Flexible hours, fully remote.",
    requirements: ["Strong portfolio", "Figma & Adobe Suite proficiency", "Ability to meet deadlines", "Client communication experience"]
  },
  {
    id: 6,
    title: "Operations Coordinator",
    company: "Logistics Hub NG",
    pay: "₦220,000/mo",
    type: "Full-time",
    location: "Port Harcourt, NG",
    tags: ["Logistics", "Coordination", "Excel"],
    posted: "1 day ago",
    featured: false,
    desc: "Coordinate daily logistics operations, manage vendor relationships, and ensure timely delivery across our supply chain network.",
    requirements: ["2+ years operations experience", "Strong Excel skills", "Logistics or supply chain background", "Attention to detail"]
  }
];

let activeFilters = { type: 'all' };
let searchQuery = '';

function getInitials(name) {
  return name.split(' ').slice(0,2).map(w => w[0]).join('').toUpperCase();
}

function renderJobs() {
  const grid = document.getElementById('jobs-grid');
  const q = searchQuery.toLowerCase();
  const filtered = jobs.filter(j => {
    const matchType = activeFilters.type === 'all' || j.type === activeFilters.type;
    const matchQ = !q || j.title.toLowerCase().includes(q) || j.company.toLowerCase().includes(q) || j.tags.some(t => t.toLowerCase().includes(q));
    return matchType && matchQ;
  });

  document.getElementById('results-count').textContent = `${filtered.length} role${filtered.length !== 1 ? 's' : ''} found`;

  if (!filtered.length) {
    grid.innerHTML = '<div class="no-results"><strong>No listings found</strong><p>Try a different search or filter.</p></div>';
    return;
  }

  grid.innerHTML = filtered.map((j, i) => `
    <div class="job-card" style="animation-delay:${i * 0.05}s" onclick="openDetail(${j.id})">
      <div class="card-top">
        <div class="company-logo">${getInitials(j.company)}</div>
        ${j.featured ? '<span class="featured-badge">Featured</span>' : ''}
      </div>
      <div class="job-title">${j.title}</div>
      <div class="company-name">${j.company}</div>
      <div class="pay">${j.pay}</div>
      <div class="tags">${j.tags.map(t => `<span class="tag">${t}</span>`).join('')}
        <span class="tag">${j.type}</span>
      </div>
      <div class="card-footer">
        <span class="location">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
          ${j.location}
        </span>
        <span class="posted">${j.posted}</span>
      </div>
    </div>
  `).join('');
}

function openDetail(id) {
  const j = jobs.find(x => x.id === id);
  if (!j) return;
  const applyHref = j.apply ? (j.apply.startsWith('http') ? j.apply : `mailto:${j.apply}`) : '#';
  document.getElementById('modal-content').innerHTML = `
    <div class="card-top" style="margin-bottom:0.5rem">
      <div class="company-logo">${getInitials(j.company)}</div>
      ${j.featured ? '<span class="featured-badge">Featured</span>' : ''}
    </div>
    <h2>${j.title}</h2>
    <div class="co">${j.company} · ${j.location} · ${j.type}</div>
    <div class="pay">${j.pay}</div>
    <div class="tags">${j.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    <h3>About the role</h3>
    <p>${j.desc}</p>
    <h3>Requirements</h3>
    <ul>${j.requirements.map(r => `<li>${r}</li>`).join('')}</ul>
    <a href="${applyHref}" class="apply-big" target="_blank">Apply now</a>
  `;
  document.getElementById('detail-modal').classList.add('open');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

document.getElementById('detail-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal('detail-modal');
});
document.getElementById('post-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal('post-modal');
});

document.getElementById('open-post-modal').addEventListener('click', function(e) {
  e.preventDefault();
  document.getElementById('post-modal').classList.add('open');
});

document.getElementById('search-input').addEventListener('keyup', function(e) {
  if (e.key === 'Enter') applyFilters();
});

function applyFilters() {
  searchQuery = document.getElementById('search-input').value;
  renderJobs();
}

function setFilter(key, val, btn) {
  activeFilters[key] = val;
  document.querySelectorAll(`[data-filter="${key}"]`).forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderJobs();
}

function postJob() {
  const title = document.getElementById('f-title').value.trim();
  const company = document.getElementById('f-company').value.trim();
  const pay = document.getElementById('f-pay').value.trim();
  const type = document.getElementById('f-type').value;
  const location = document.getElementById('f-location').value.trim() || 'Not specified';
  const apply = document.getElementById('f-apply').value.trim();
  const tagsRaw = document.getElementById('f-tags').value.trim();
  const desc = document.getElementById('f-desc').value.trim();

  if (!title || !company || !pay || !apply || !desc) {
    alert('Please fill in all required fields (*).');
    return;
  }

  const newJob = {
    id: Date.now(),
    title, company, pay, type, location,
    apply,
    tags: tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [],
    posted: 'Just now',
    featured: false,
    desc,
    requirements: ["See full job description"]
  };

  jobs.unshift(newJob);
  closeModal('post-modal');
  ['f-title','f-company','f-pay','f-location','f-apply','f-tags','f-desc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-type').value = 'Full-time';
  renderJobs();
}

renderJobs();
</script>
</body>
</html>
